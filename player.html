<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糊糊的私人播客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .episode-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .episode-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .episode-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .episode-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .active {
            border: 2px solid #667eea;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 20px;
            }

            .episode-title {
                font-size: 16px;
            }

            .episode-desc {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 糊糊的私人播客</h1>

        <!-- Episode 1 -->
        <div class="episode-card">
            <div class="episode-title">设计师在AI时代出路很清晰：远离Figma，尽早写代码</div>
            <div class="episode-desc">Cursor设计负责人Ryo Lu深度对话：设计师如何转型为独立构建者（Builder）。从Figma到代码，从分工到独立创造。</div>
            <div class="episode-meta">时长：47:00 | 发布：2026-03-15</div>
            <audio controls>
                <source src="https://hszzz-x.github.io/private-podcast/audio/20260315_014557_.m4a" type="audio/mp4">
                您的浏览器不支持音频播放。
            </audio>
        </div>

        <!-- Add more episodes here -->
    </div>

    <script>
        // Auto-play next episode when current one ends
        const audioElements = document.querySelectorAll('audio');
        audioElements.forEach((audio, index) => {
            audio.addEventListener('ended', () => {
                if (index < audioElements.length - 1) {
                    audioElements[index + 1].play();
                }
            });

            audio.addEventListener('play', () => {
                audioElements.forEach(a => {
                    if (a !== audio) a.pause();
                });
                audio.parentElement.classList.add('active');
            });

            audio.addEventListener('pause', () => {
                audio.parentElement.classList.remove('active');
            });
        });
    </script>
</body>
</html>
