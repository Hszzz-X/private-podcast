<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糊糊的私人播客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #FFFFFF;
            min-height: 100vh;
            padding: 40px 20px;
            color: #1a1a1a;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        h1 {
            font-size: 20px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        .stats {
            font-size: 13px;
            color: #888888;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .episode-card {
            padding: 24px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .episode-card:last-child {
            border-bottom: none;
        }

        .episode-title {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .episode-desc {
            font-size: 14px;
            color: #666666;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .episode-meta {
            font-size: 12px;
            color: #888888;
            margin-bottom: 12px;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        @media (max-width: 640px) {
            body {
                padding: 30px 16px;
            }
            .episode-title {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>私人播客</h1>

        <div class="stats">
            AI 2期 (1h 18m)
        </div>

        <!-- Episode 1: Jeff Kaplan 中文播客 -->
        <div class="episode-card">
            <div class="episode-title">游戏设计传奇：Jeff Kaplan的职业生涯、设计哲学与暴雪往事（中文播客）</div>
            <div class="episode-desc">Jeff Kaplan是暴雪传奇游戏设计师，曾主导《魔兽世界》和《守望先锋》。本期中文播客深入探讨了他的职业生涯、设计哲学和暴雪往事。</div>
            <div class="episode-meta">时长：31:00 | 发布：2026-03-16</div>
            <audio controls preload="metadata">
                <source src="audio/20260316_070226_jeff_kaplan.m4a" type="audio/mp4">
            </audio>
        </div>

        <!-- Episode 2: 设计师AI时代 -->
        <div class="episode-card">
            <div class="episode-title">设计师在AI时代出路很清晰：远离Figma，尽早写代码</div>
            <div class="episode-desc">Cursor设计负责人Ryo Lu深度对话：设计师如何转型为独立构建者（Builder）。从Figma到代码，从分工到独立创造。</div>
            <div class="episode-meta">时长：47:00 | 发布：2026-03-15</div>
            <audio controls preload="metadata">
                <source src="audio/20260315_014557_.m4a" type="audio/mp4">
            </audio>
        </div>
    </div>

    <script>
        // 简单的错误处理
        document.querySelectorAll('audio').forEach((audio, index) => {
            audio.addEventListener('error', (e) => {
                console.error('音频加载失败:', e);
                const card = audio.closest('.episode-card');
                const errorMsg = document.createElement('div');
                errorMsg.style.color = 'red';
                errorMsg.style.fontSize = '12px';
                errorMsg.style.marginTop = '10px';
                errorMsg.textContent = '⚠️ 音频文件加载失败，请检查文件路径';
                card.appendChild(errorMsg);
            });

            audio.addEventListener('canplay', () => {
                console.log(`音频 ${index + 1} 加载成功`);
            });
        });
    </script>
</body>
</html>
